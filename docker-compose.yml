services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: yt-extractor-web
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
      # Needed so the web app can spawn jauderho/yt-dlp containers
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DATA_DIR: /data
      YT_EXTRACTOR_ROOT: /app
      USE_DOCKER: auto
      DOWNLOADER_IMAGE: jauderho/yt-dlp
      HOST: 0.0.0.0
      PORT: "8080"
    restart: unless-stopped
