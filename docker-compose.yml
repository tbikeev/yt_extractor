services:
  downloader:
    build:
      context: .
      dockerfile: downloader/Dockerfile
    image: yt-extractor-downloader
    profiles: ["tools"]

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: yt-extractor-web
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
      # Optional: uncomment to let the app spawn the downloader container
      # - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DATA_DIR: /data
      YT_EXTRACTOR_ROOT: /app
      USE_DOCKER: never
      DOWNLOADER_IMAGE: yt-extractor-downloader
      HOST: 0.0.0.0
      PORT: "8080"
    restart: unless-stopped
