<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0D7377" />
  <title>YT Extractor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/styles.css" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <a class="brand" href="#/" data-link>
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-name">YT Extractor</span>
      </a>
      <nav class="nav">
        <a href="#/" data-link class="nav-link" data-nav="library">Library</a>
        <a href="#/search" data-link class="nav-link" data-nav="search">Search</a>
      </nav>
    </header>

    <main id="view" class="view"></main>
  </div>

  <template id="tpl-home">
    <section class="hero">
      <div class="hero-atmosphere" aria-hidden="true"></div>
      <div class="hero-copy">
        <p class="brand-hero">YT Extractor</p>
        <h1>Save a YouTube video for offline watching</h1>
        <p class="lede">Downloads locally, converts to MP4, and indexes original subtitles so you can search and jump by timestamp — on iPhone or desktop.</p>
        <form class="download-form" id="download-form">
          <label class="sr-only" for="url">YouTube URL</label>
          <input id="url" name="url" type="url" inputmode="url" list="url-history"
                 autocomplete="url" placeholder="Paste a YouTube link…" required />
          <datalist id="url-history"></datalist>
          <div class="url-history" id="url-history-panel" hidden>
            <div class="url-history-head">
              <span>Recent links</span>
              <button type="button" class="linkish" id="clear-url-history">Clear</button>
            </div>
            <ul id="url-history-list" class="url-history-list"></ul>
          </div>
          <div class="form-row">
            <label class="lang">
              Subs
              <select id="language" name="language">
                <option value="en">English</option>
                <option value="de">German</option>
                <option value="fr">French</option>
                <option value="es">Spanish</option>
                <option value="ru">Russian</option>
                <option value="ja">Japanese</option>
                <option value="zh">Chinese</option>
              </select>
            </label>
            <button type="submit" class="btn primary" id="download-btn">Download</button>
          </div>
          <p class="form-status" id="form-status" hidden></p>
        </form>
      </div>
    </section>

    <section class="library-section">
      <div class="section-head">
        <h2>Your library</h2>
        <p>Videos stored on this machine — playable on the local network.</p>
      </div>
      <div id="job-panel" class="job-panel" hidden>
        <div class="job-panel-head">
          <span>Activity</span>
          <button type="button" class="linkish" id="clear-job-errors" hidden>Clear errors</button>
        </div>
        <div id="job-list" class="job-list"></div>
      </div>
      <div id="library" class="library"></div>
    </section>
  </template>

  <template id="tpl-watch">
    <section class="watch">
      <button type="button" class="back-link" id="back-btn">← Library</button>
      <div class="watch-layout">
        <div class="player-pane">
          <div class="player-shell">
            <video id="player" controls playsinline preload="metadata"></video>
          </div>
          <h1 id="watch-title" class="watch-title"></h1>
          <div class="watch-meta" id="watch-meta"></div>
          <div class="watch-actions" id="watch-actions" hidden>
            <a class="btn ghost" id="download-subs-vtt" href="#" download>Download VTT</a>
            <a class="btn ghost" id="download-subs-json" href="#" download>Download JSON</a>
          </div>
        </div>
        <aside class="transcript-pane">
          <div class="transcript-toolbar">
            <h2>Transcript</h2>
            <label class="filter">
              <span class="sr-only">Filter cues</span>
              <input type="search" id="cue-filter" placeholder="Filter this video…" />
            </label>
          </div>
          <div id="cues" class="cues" role="list"></div>
        </aside>
      </div>
    </section>
  </template>

  <template id="tpl-search">
    <section class="search-page">
      <div class="section-head">
        <h1>Search subtitles</h1>
        <p>Full-text search across every indexed transcript in your library.</p>
      </div>
      <form class="search-form" id="search-form">
        <input type="search" id="search-q" placeholder="Find a phrase…" autofocus />
        <button type="submit" class="btn primary">Search</button>
      </form>
      <div id="search-results" class="search-results"></div>
    </section>
  </template>

  <script src="/assets/js/app.js" type="module"></script>
</body>
</html>
